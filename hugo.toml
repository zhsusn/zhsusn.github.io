# ============================================
# Phase 1: 书籍化架构基础配置
# ============================================

baseURL = 'https://zhsusn.github.io'
languageCode = 'zh-CN'
title = 'zhsusn Tech Blog'
theme = 'PaperMod'
paginate = 10

# ------------------- 核心：自定义 Taxonomy（书籍化架构） -------------------
[taxonomies]
  series = 'series'      # 系列（相当于书）
  volume = 'volume'      # 卷/部
  tag = 'tags'          # 保留标签但降级为辅助
  category = 'categories'

# ------------------- 菜单配置 -------------------
[menu]
  [[menu.main]]
    identifier = 'series'
    name = '📚 系列'
    url = '/series/'
    weight = 10
    
  [[menu.main]]
    identifier = 'standalone'
    name = '📝 随笔'
    url = '/standalone/'
    weight = 20
    
  [[menu.main]]
    identifier = 'search'
    name = '🔍 搜索'
    url = '/search/'
    weight = 30
    
  [[menu.main]]
    identifier = 'about'
    name = '👤 关于'
    url = '/about/'
    weight = 40

# ------------------- 站点参数 -------------------
[params]
  author = 'zhsusn'
  description = "大数据架构师的技术沉淀 | 云原生与数据工程实践"
  keywords = ["大数据", "架构设计", "云原生", "DevOps"]
  
  # 主题设置
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  
  # 搜索配置（Fuse.js）
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content", "series", "volume"]

  # 书籍化参数
  [params.books]
    enableSeriesNavigation = true  # 启用系列导航
    enableChapterNumbering = true  # 启用章节编号
    showVolumeInList = true       # 列表中显示卷信息

# ------------------- 输出配置 -------------------
[outputs]
  home = ["HTML", "RSS", "JSON"]  # JSON 用于搜索索引

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = true