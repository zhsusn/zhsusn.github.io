{{ define "main" }}

<div class="search-container max-w-3xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold mb-8 text-center">🔍 内容搜索</h1>
    
    <div class="relative mb-8">
        <input type="text" 
               id="search-input" 
               placeholder="{{ .Params.placeholder }}" 
               class="w-full px-6 py-4 border-2 border-slate-200 dark:border-slate-700 rounded-xl text-lg focus:border-blue-500 focus:outline-none dark:bg-slate-800 dark:text-slate-100 transition-colors"
               autocomplete="off">
        <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-slate-400">
            <kbd class="px-2 py-1 bg-slate-100 dark:bg-slate-700 rounded text-xs">ESC 清空</kbd>
        </div>
    </div>

    <div id="search-results" class="space-y-4">
        <div class="text-center text-slate-500 py-12">
            <p>输入关键词开始搜索</p>
            <p class="text-sm mt-2">支持标题、内容、系列名称模糊匹配</p>
        </div>
    </div>
    
    <div id="search-stats" class="mt-4 text-sm text-slate-500 text-center hidden"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
<script>
let fuse = null;
let searchIndex = [];

// 加载搜索索引
fetch('/index.json')
    .then(response => response.json())
    .then(data => {
        searchIndex = data;
        fuse = new Fuse(data, {
            keys: [
                { name: 'title', weight: 0.8 },
                { name: 'content', weight: 0.5 },
                { name: 'series', weight: 0.3 },
                { name: 'volume', weight: 0.2 },
                { name: 'tags', weight: 0.2 }
            ],
            threshold: 0.4,
            includeScore: true,
            includeMatches: true
        });
        console.log('搜索索引加载完成，共', data.length, '篇文章');
    })
    .catch(err => console.error('搜索索引加载失败:', err));

// 执行搜索
function performSearch(query) {
    const resultsDiv = document.getElementById('search-results');
    const statsDiv = document.getElementById('search-stats');
    
    if (!query.trim()) {
        resultsDiv.innerHTML = `
            <div class="text-center text-slate-500 py-12">
                <p>输入关键词开始搜索</p>
            </div>
        `;
        statsDiv.classList.add('hidden');
        return;
    }
    
    if (!fuse) {
        resultsDiv.innerHTML = '<div class="text-center text-slate-500">索引加载中，请稍候...</div>';
        return;
    }
    
    const results = fuse.search(query);
    
    if (results.length === 0) {
        resultsDiv.innerHTML = `
            <div class="text-center text-slate-500 py-12">
                <p>未找到相关内容</p>
                <p class="text-sm mt-2">尝试使用更简短的关键词，如 "分布式"、"Hugo"</p>
            </div>
        `;
        statsDiv.classList.add('hidden');
        return;
    }
    
    // 显示统计
    statsDiv.textContent = `找到 ${results.length} 个结果（按相关度排序）`;
    statsDiv.classList.remove('hidden');
    
    // 渲染结果
    resultsDiv.innerHTML = results.slice(0, 20).map(result => {
        const item = result.item;
        const score = (result.score * 100).toFixed(0);
        
        // 高亮匹配文本
        let context = item.summary || item.content.substring(0, 150) + '...';
        if (result.matches) {
            result.matches.forEach(match => {
                if (match.key === 'content' || match.key === 'title') {
                    const text = match.value;
                    const indices = match.indices[0];
                    const before = text.substring(Math.max(0, indices[0] - 20), indices[0]);
                    const matchText = text.substring(indices[0], indices[1] + 1);
                    const after = text.substring(indices[1] + 1, indices[1] + 50);
                    context = `...${before}<span class="bg-yellow-200 dark:bg-yellow-900 px-1 rounded">${matchText}</span>${after}...`;
                }
            });
        }
        
        // 系列/卷标签
        let metaTags = [];
        if (item.series) metaTags.push(`<span class="text-blue-600 dark:text-blue-400">📚 ${item.series}</span>`);
        if (item.volume) metaTags.push(`<span class="text-purple-600 dark:text-purple-400">📖 ${item.volume}</span>`);
        if (item.chapter) metaTags.push(`<span class="text-slate-500">第${item.chapter}章</span>`);
        
        return `
            <article class="p-6 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-blue-500 hover:shadow-md transition-all cursor-pointer group"
                     onclick="window.location.href='${item.permalink}'">
                <div class="flex items-start justify-between mb-2">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-slate-100 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                        ${item.title}
                    </h3>
                    <span class="text-xs text-slate-400">${item.readingTime || '5'} min</span>
                </div>
                
                <div class="flex gap-3 text-xs mb-3">
                    ${metaTags.join('<span class="text-slate-300 mx-1">·</span>')}
                </div>
                
                <p class="text-sm text-slate-600 dark:text-slate-400 line-clamp-2 leading-relaxed">
                    ${context}
                </p>
                
                <div class="mt-3 flex items-center text-xs text-slate-400">
                    <span>${item.date}</span>
                    ${item.tags ? `<span class="mx-2">·</span><span>${item.tags.slice(0, 3).join(', ')}</span>` : ''}
                </div>
            </article>
        `;
    }).join('');
}

// 事件监听
const searchInput = document.getElementById('search-input');
let debounceTimer;

searchInput.addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => performSearch(e.target.value), 300);
});

searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        searchInput.value = '';
        performSearch('');
        searchInput.blur();
    }
});

// 页面加载后聚焦输入框
window.addEventListener('load', () => {
    searchInput.focus();
});

// 键盘快捷键 Ctrl/Cmd + K
document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
    }
});
</script>

<style>
.search-container {
    min-height: 60vh;
}
</style>

{{ end }}
