<!-- 让 RSS 链接在新标签页打开，并添加提示 -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 找到 RSS 图标链接（通常是最后一个社交图标或包含 index.xml 的链接）
    const rssLink = document.querySelector('a[href*="index.xml"]');
    if (rssLink) {
        rssLink.setAttribute('target', '_blank');
        rssLink.setAttribute('rel', 'noopener noreferrer');
        rssLink.title = "RSS 订阅源（可用 RSS 阅读器订阅）";
        
        // 可选：点击时显示友好提示
        rssLink.addEventListener('click', function(e) {
            // 如果不是 Ctrl/Command 点击，显示提示
            if (!e.ctrlKey && !e.metaKey) {
                const confirm = window.confirm(
                    '📡 这是 RSS 订阅链接\n\n' +
                    '你可以：\n' +
                    '1. 复制当前地址到 RSS 阅读器（如 Feedly）\n' +
                    '2. 直接打开查看 XML 源码\n\n' +
                    '是否继续打开？'
                );
                if (!confirm) {
                    e.preventDefault();
                    // 尝试复制到剪贴板
                    navigator.clipboard.writeText(this.href).then(() => {
                        alert('✅ RSS 链接已复制到剪贴板，请粘贴到你的 RSS 阅读器');
                    });
                }
            }
        });
    }
});
</script>
