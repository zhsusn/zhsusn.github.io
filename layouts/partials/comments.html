{{ if not .Params.disableComments }}
<div class="comments max-w-3xl mx-auto px-4 mt-16 pt-8 border-t border-slate-200 dark:border-slate-800">
  <h3 class="text-lg font-bold mb-6 text-slate-900 dark:text-slate-100">💬 章节讨论</h3>
  
  <script src="https://giscus.app/client.js"
          data-repo="zhsusn/zhsusn.github.io"
          data-repo-id="YOUR_REPO_ID"
          data-category="Announcements"
          data-category-id="YOUR_CATEGORY_ID"
          data-mapping="pathname"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="bottom"
          data-theme="preferred_color_scheme"
          data-lang="zh-CN"
          crossorigin="anonymous"
          async>
  </script>
</div>

<style>
/* Giscus 暗色模式适配 */
.dark .giscus-frame {
  color-scheme: dark;
}
</style>
{{ end }}
