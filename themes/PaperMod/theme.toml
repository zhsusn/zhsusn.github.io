name = "PaperMod"
description = "A fast, clean, and responsive theme for Hugo."
author = "Aditya Telange"
author_url = "https://adityatelange.github.io"
license = "MIT"
tags = ["responsive", "clean", "fast", "modern", "minimal"]
features = ["responsive", "dark mode", "light mode", "search", "multilingual", "SEO"]
min_version = "0.100.0"

[params]
  # Default theme mode
  defaultTheme = "auto"
  # Show reading time
  ShowReadingTime = true
  # Show share buttons
  ShowShareButtons = true
  # Show post navigation links
  ShowPostNavLinks = true
  # Show breadcrumbs
  ShowBreadCrumbs = true
  # Show code copy buttons
  ShowCodeCopyButtons = true