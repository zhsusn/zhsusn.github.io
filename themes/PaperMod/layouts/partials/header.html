<header class="nav">
    <div class="container">
        <div class="logo">
            <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
        </div>
        <nav id="menu">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}">{{ .Name }}</a>
            {{ end }}
        </nav>
        <button id="theme-toggle" aria-label="Toggle theme">
            {{ if eq .Site.Params.defaultTheme "dark" }}
            🌙
            {{ else }}
            ☀️
            {{ end }}
        </button>
    </div>
</header>
