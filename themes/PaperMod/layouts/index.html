{{ define "main" }}
    <section class="profile">
        <img src="{{ .Site.Params.avatar | default "/images/profile.png" }}" alt="Profile" width="120" height="120">
        <h1>{{ .Site.Title }}</h1>
        <span>{{ .Site.Params.description }}</span>
        <div class="buttons">
            <a href="/posts/" class="button">查看文章</a>
            <a href="/about/" class="button">关于我</a>
        </div>
    </section>
    <section class="posts">
        <h2>最新文章</h2>
        {{ range first 5 .Site.RegularPages }}
        <article class="post-entry">
            <div class="entry-header">
                <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
            </div>
            <div class="entry-content">
                <p>{{ .Summary }}</p>
            </div>
            <div class="entry-footer">
                <span>{{ .Date.Format "2006-01-02" }}</span>
                <span>{{ .ReadingTime }} 分钟阅读</span>
            </div>
        </article>
        {{ end }}
    </section>
{{ end }}
