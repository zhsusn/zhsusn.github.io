<script>

function shareArticle() {
  if (navigator.share) {
    navigator.share({
      title: '阅读仪表盘',
      url: window.location.href
    });
  } else {
    navigator.clipboard.writeText(window.location.href);
    showToast('链接已复制到剪贴板');
  }
}


function likeArticle() {
  const key = 'liked-http:\/\/localhost:1313\/dashboard\/';
  const isLiked = localStorage.getItem(key);
  const btn = document.querySelector('#like-count');
  
  if (!isLiked) {
    localStorage.setItem(key, 'true');
    btn.textContent = '已收藏';
    btn.parentElement.classList.add('text-red-500');
    showToast('已添加到收藏');
  } else {
    localStorage.removeItem(key);
    btn.textContent = '收藏';
    btn.parentElement.classList.remove('text-red-500');
  }
}


function toggleBookmark() {
  const pos = document.documentElement.scrollTop;
  localStorage.setItem('bookmark-http:\/\/localhost:1313\/dashboard\/', pos);
  showToast(`书签已保存（位置：${Math.round(pos)}px）`);
}


document.addEventListener('keydown', (e) => {
  
  if (e.key === 'f' && !e.ctrlKey && !e.metaKey && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    toggleFocusMode();
  }
  
  if (e.key === 'Escape') {
    if (document.body.classList.contains('focus-mode')) {
      toggleFocusMode();
    }
  }
});


document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('liked-http:\/\/localhost:1313\/dashboard\/')) {
    const btn = document.querySelector('#like-count');
    if (btn) {
      btn.textContent = '已收藏';
      btn.parentElement.classList.add('text-red-500');
    }
  }
});
</script>

<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var toplink = document.getElementById("top-link");
    window.onscroll = function () {
        const scrollThreshold = window.innerHeight;
        if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
            toplink.classList.remove("hidden");
        } else {
            toplink.classList.add("hidden");
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const html = document.querySelector("html");
        if (html.dataset.theme === "dark") {
            html.dataset.theme = 'light';
            localStorage.setItem("pref-theme", 'light');
        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
<script>
    document.querySelectorAll('pre > code').forEach((codeblock) => {
        const container = codeblock.parentNode.parentNode;

        const copybutton = document.createElement('button');
        copybutton.classList.add('copy-code');
        copybutton.innerHTML = 'copy';

        function copyingDone() {
            copybutton.innerHTML = 'copied!';
            setTimeout(() => {
                copybutton.innerHTML = 'copy';
            }, 2000);
        }

        copybutton.addEventListener('click', (cb) => {
            if ('clipboard' in navigator) {
                navigator.clipboard.writeText(codeblock.textContent);
                copyingDone();
                return;
            }

            const range = document.createRange();
            range.selectNodeContents(codeblock);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
            try {
                document.execCommand('copy');
                copyingDone();
            } catch (e) { };
            selection.removeRange(range);
        });

        if (container.classList.contains("highlight")) {
            container.appendChild(copybutton);
        } else if (container.parentNode.firstChild == container) {
            
        } else if (codeblock.parentNode.parentNode.parentNode.parentNode.parentNode.nodeName == "TABLE") {
            
            codeblock.parentNode.parentNode.parentNode.parentNode.parentNode.appendChild(copybutton);
        } else {
            
            codeblock.parentNode.appendChild(copybutton);
        }
    });
</script>
