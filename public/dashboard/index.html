<script>

function shareArticle() {
  if (navigator.share) {
    navigator.share({
      title: '阅读仪表盘',
      url: window.location.href
    });
  } else {
    navigator.clipboard.writeText(window.location.href);
    showToast('链接已复制到剪贴板');
  }
}


function likeArticle() {
  const key = 'liked-http:\/\/localhost:1313\/dashboard\/';
  const isLiked = localStorage.getItem(key);
  const btn = document.querySelector('#like-count');
  
  if (!isLiked) {
    localStorage.setItem(key, 'true');
    btn.textContent = '已收藏';
    btn.parentElement.classList.add('text-red-500');
    showToast('已添加到收藏');
  } else {
    localStorage.removeItem(key);
    btn.textContent = '收藏';
    btn.parentElement.classList.remove('text-red-500');
  }
}


function toggleBookmark() {
  const pos = document.documentElement.scrollTop;
  localStorage.setItem('bookmark-http:\/\/localhost:1313\/dashboard\/', pos);
  showToast(`书签已保存（位置：${Math.round(pos)}px）`);
}


document.addEventListener('keydown', (e) => {
  
  if (e.key === 'f' && !e.ctrlKey && !e.metaKey && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    toggleFocusMode();
  }
  
  if (e.key === 'Escape') {
    if (document.body.classList.contains('focus-mode')) {
      toggleFocusMode();
    }
  }
});


document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('liked-http:\/\/localhost:1313\/dashboard\/')) {
    const btn = document.querySelector('#like-count');
    if (btn) {
      btn.textContent = '已收藏';
      btn.parentElement.classList.add('text-red-500');
    }
  }
});
</script>
